<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FMLY Animated Hero</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="hero" aria-label="Animated brand hero section">
      <div class="gradient-layer gradient-layer--base" aria-hidden="true"></div>
      <div class="gradient-layer gradient-layer--swirl" aria-hidden="true"></div>
      <div class="gradient-layer gradient-layer--pulse" aria-hidden="true"></div>
      <div class="glow glow--orange" aria-hidden="true"></div>
      <div class="glow glow--olive" aria-hidden="true"></div>
      <div class="water-particles" aria-hidden="true"></div>

      <section class="logo-wrap" aria-label="Pyramid logo with halo and pendulum interaction">
        <button
          class="logo-button"
          id="logoButton"
          type="button"
          aria-label="Trigger pendulum hit on pyramid logo"
        >
          <svg
            class="logo"
            viewBox="0 0 320 360"
            role="img"
            aria-labelledby="logoTitle logoDesc"
          >
            <title id="logoTitle">Pyramid with halo logo</title>
            <desc id="logoDesc">
              A pyramid centered on the page with a floating halo and a line beneath.
            </desc>

            <circle class="logo-ring" cx="160" cy="114" r="74" />
            <circle class="logo-ring logo-ring--outer" cx="160" cy="114" r="98" />

            <polygon class="logo-pyramid" points="160,122 74,274 246,274" />
            <line class="logo-base-line" x1="70" y1="304" x2="250" y2="304" />
          </svg>

          <div class="pendulum" id="pendulum" aria-hidden="true">
            <svg class="pendulum-sigil" viewBox="0 0 180 300" role="presentation">
              <circle class="sigil-stroke" cx="90" cy="24" r="17" />
              <line class="sigil-stroke" x1="90" y1="42" x2="90" y2="198" />
              <path class="sigil-stroke" d="M56 66 L124 66" />
              <path class="sigil-stroke" d="M36 108 L144 108" />
              <path class="sigil-stroke" d="M52 146 L128 146" />
              <circle class="sigil-stroke" cx="90" cy="226" r="64" />
              <line class="sigil-stroke" x1="28" y1="226" x2="152" y2="226" />
              <line class="sigil-stroke" x1="90" y1="198" x2="90" y2="290" />
              <text class="sigil-text" x="58" y="242">A</text>
              <text class="sigil-text" x="106" y="242">V</text>
            </svg>
          </div>
        </button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
