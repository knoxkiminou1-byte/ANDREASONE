<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Topographic Olive Background</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #3a5618;
  }
  svg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <filter id="topo" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.007 0.011" numOctaves="4" seed="42" result="noise">
        <animate attributeName="baseFrequency" dur="120s" repeatCount="indefinite"
          values="0.007 0.011;0.010 0.008;0.008 0.013;0.012 0.009;0.007 0.011" />
      </feTurbulence>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feComponentTransfer in="gray">
        <feFuncR type="discrete" tableValues="0.227 0.227 0.141 0.227 0.227 0.141 0.227 0.227 0.141 0.227 0.227 0.141"/>
        <feFuncG type="discrete" tableValues="0.337 0.337 0.208 0.337 0.337 0.208 0.337 0.337 0.208 0.337 0.337 0.208"/>
        <feFuncB type="discrete" tableValues="0.094 0.094 0.063 0.094 0.094 0.063 0.094 0.094 0.063 0.094 0.094 0.063"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#3a5618" filter="url(#topo)"/>
</svg>
</body>
</html>
