kind = "web"
previewPath = "/"
title = "AndreasOne"
version = "1.0.0"
id = "artifacts/andreasone"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23180

[services.development]
run = "pnpm --filter @workspace/andreasone run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/andreasone", "run", "build" ]
publicDir = "artifacts/andreasone/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23180"
BASE_PATH = "/"
